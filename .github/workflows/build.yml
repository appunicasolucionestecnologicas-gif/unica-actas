name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip build-essential git \
          openjdk-17-jdk unzip autoconf \
          libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake
        pip install buildozer cython

    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: unica-actas-apk
        path: bin/*.apk
