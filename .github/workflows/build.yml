name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          python3-pip build-essential git \
          openjdk-17-jdk unzip autoconf \
          libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake
        pip install buildozer cython

    - name: Accept Android licenses
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        yes | buildozer android update 2>/dev/null || true
        find $HOME/.buildozer -name "sdkmanager" | head -1 | xargs -I{} sh -c 'yes | {} --licenses' 2>/dev/null || true

    - name: Build APK
      run: |
        yes | buildozer android debug 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: unica-actas-apk
        path: bin/*.apk
