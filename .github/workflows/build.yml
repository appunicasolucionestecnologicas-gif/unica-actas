
name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          python3-pip build-essential git \
          openjdk-17-jdk unzip autoconf \
          libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake
        pip install buildozer cython

    - name: Accept SDK licenses manually
      run: |
        ANDROID_SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_SDK/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK/licenses/android-sdk-license
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $ANDROID_SDK/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK/licenses/android-sdk-preview-license

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: unica-actas-apk
        path: bin/*.apk
