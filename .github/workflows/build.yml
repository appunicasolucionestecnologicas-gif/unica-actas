name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build with Kivy Action
      uses: kivy/kivy-action@main
      with:
        command: 'buildozer -v android debug'
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: UNICA-APK
        path: bin/*.apk
