name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          python3-pip build-essential git \
          openjdk-17-jdk unzip autoconf \
          libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev cmake
        pip install buildozer cython

    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        buildozer android update || true
        SDKMANAGER=$(find $HOME/.buildozer -name "sdkmanager" 2>/dev/null | head -1)
        if [ -n "$SDKMANAGER" ]; then
          yes | $SDKMANAGER --licenses || true
          yes | $SDKMANAGER "build-tools;33.0.2" "platform-tools" "platforms;android-33" || true
        fi

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: unica-actas-apk
        path: bin/*.apk
